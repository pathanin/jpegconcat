<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Stitcher</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #111;
  color: #e2e2e2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: #1c1c1c;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
}
h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
.header-right { display: flex; align-items: center; gap: 12px; }
#status { font-size: 0.8rem; color: #666; }

#stitch-btn {
  padding: 7px 16px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s;
}
#stitch-btn:hover:not(:disabled) { background: #1d4ed8; }
#stitch-btn:disabled { background: #2a2a2a; color: #555; cursor: default; }

/* ── Main area ───────────────────────────────────────────────────────────── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  overflow: auto;
}

/* ── Empty drop zone ─────────────────────────────────────────────────────── */
#drop-zone {
  width: 380px;
  height: 260px;
  border: 2px dashed #333;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: #555;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  user-select: none;
}
#drop-zone.drag-over {
  border-color: #2563eb;
  color: #3b82f6;
  background: rgba(37,99,235,0.06);
}
#drop-zone svg { flex-shrink: 0; }
#drop-zone .hint { font-size: 0.75rem; color: #444; }
#file-input { display: none; }

/* ── Grid wrapper ────────────────────────────────────────────────────────── */
#grid-outer {
  display: none;
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
}

/* ── Grid ────────────────────────────────────────────────────────────────── */
#grid-scroll {
  display: flex;
  align-items: flex-start;
  gap: 0;
}

#grid {
  display: inline-grid;
  gap: 3px;
  background: #1c1c1c;
  padding: 3px;
  border-radius: 8px;
  border: 1px solid #2a2a2a;
}

/* ── Cell ────────────────────────────────────────────────────────────────── */
.cell {
  position: relative;
  overflow: hidden;
  border-radius: 4px;
  background: #1a1a1a;
  cursor: grab;
  outline: 2px solid transparent;
  transition: outline-color 0.1s;
}
.cell:active { cursor: grabbing; }
.cell.dragging { opacity: 0.35; }

.cell img {
  display: block;
  max-width: 200px;
  max-height: 200px;
  width: auto;
  height: auto;
  pointer-events: none;
  user-select: none;
}

/* ── Empty cell ──────────────────────────────────────────────────────────── */
.cell.empty {
  width: 72px;
  height: 72px;
  border: 2px dashed #2a2a2a;
  background: #181818;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #3a3a3a;
  font-size: 1.3rem;
  cursor: default;
}
.cell.empty.drag-over-empty {
  border-color: #2563eb;
  color: #3b82f6;
  background: rgba(37,99,235,0.08);
}

/* ── Drop zone overlays ──────────────────────────────────────────────────── */
.drop-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}
/* Quadrant highlights appear as semi-transparent strips */
.drop-overlay .dz {
  position: absolute;
  opacity: 0;
  transition: opacity 0.08s;
  background: rgba(37,99,235,0.45);
}
.drop-overlay .dz.active { opacity: 1; }
.drop-overlay .dz-center { inset: 0; }
.drop-overlay .dz-left   { top: 0; left: 0; bottom: 0; width: 28%; }
.drop-overlay .dz-right  { top: 0; right: 0; bottom: 0; width: 28%; }
.drop-overlay .dz-top    { top: 0; left: 0; right: 0; height: 28%; }
.drop-overlay .dz-bottom { bottom: 0; left: 0; right: 0; height: 28%; }

/* ── Cell remove button ──────────────────────────────────────────────────── */
.btn-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 20px;
  height: 20px;
  background: rgba(0,0,0,0.65);
  border: none;
  border-radius: 4px;
  color: #aaa;
  font-size: 13px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.12s, background 0.12s, color 0.12s;
  z-index: 3;
}
.cell:hover .btn-remove { opacity: 1; }
.btn-remove:hover { background: #dc2626; color: #fff; }

/* ── Add col / add row buttons ───────────────────────────────────────────── */
#add-col-btn {
  width: 22px;
  align-self: stretch;
  margin-left: 4px;
  background: #1c1c1c;
  border: 1px dashed #2a2a2a;
  border-radius: 6px;
  color: #3a3a3a;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  flex-shrink: 0;
}
#add-col-btn:hover { background: #2563eb; color: #fff; border-color: #2563eb; }

#add-row-btn {
  height: 22px;
  margin-top: 4px;
  background: #1c1c1c;
  border: 1px dashed #2a2a2a;
  border-radius: 6px;
  color: #3a3a3a;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  align-self: stretch;
}
#add-row-btn:hover { background: #2563eb; color: #fff; border-color: #2563eb; }

/* ── Processing overlay ──────────────────────────────────────────────────── */
#processing {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  font-size: 0.9rem;
  color: #ccc;
}
#processing.visible { display: flex; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 28px;
  height: 28px;
  border: 2px solid #333;
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
</style>
</head>
<body>

<header>
  <h1>Image Stitcher</h1>
  <div class="header-right">
    <span id="status">Drop images to start</span>
    <button id="stitch-btn" disabled>Stitch &amp; Download</button>
  </div>
</header>

<main>
  <!-- Empty state -->
  <div id="drop-zone">
    <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
    </svg>
    <span>Drop images here</span>
    <span class="hint">or click to browse · supports JPEG, PNG, WebP</span>
    <input type="file" id="file-input" accept="image/*" multiple>
  </div>

  <!-- Grid state -->
  <div id="grid-outer">
    <div id="grid-scroll">
      <div id="grid"></div>
      <button id="add-col-btn" title="Add column">+</button>
    </div>
    <button id="add-row-btn" title="Add row">+</button>
  </div>
</main>

<div id="processing">
  <div class="spinner"></div>
  <span>Stitching…</span>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
// grid[r][c] = { id, name, file, dataURL } | null
let grid = [];
let dragSrc = null; // { r, c } of the cell being dragged

// ── DOM ────────────────────────────────────────────────────────────────────
const dropZoneEl  = document.getElementById('drop-zone');
const fileInput   = document.getElementById('file-input');
const gridOuter   = document.getElementById('grid-outer');
const gridEl      = document.getElementById('grid');
const addColBtn   = document.getElementById('add-col-btn');
const addRowBtn   = document.getElementById('add-row-btn');
const stitchBtn   = document.getElementById('stitch-btn');
const statusEl    = document.getElementById('status');
const processingEl = document.getElementById('processing');

// ── Utility ────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);

function readDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

const nRows = () => grid.length;
const nCols = () => (grid.length ? grid[0].length : 0);
const hasImages = () => grid.some(row => row.some(Boolean));
const imageCount = () => grid.reduce((n, r) => n + r.filter(Boolean).length, 0);

// ── Grid mutation helpers ──────────────────────────────────────────────────
function padGrid() {
  const cols = Math.max(...grid.map(r => r.length), 0);
  for (const row of grid) while (row.length < cols) row.push(null);
}

// Insert a new null column AFTER position `after` (-1 inserts before col 0).
function insertCol(after) {
  for (const row of grid) row.splice(after + 1, 0, null);
}

// Insert a new null row AFTER position `after` (-1 inserts before row 0).
function insertRow(after) {
  grid.splice(after + 1, 0, Array(nCols()).fill(null));
}

// Remove cells at (r, c), then compact: drop fully-null rows, then columns.
function removeCell(r, c) {
  grid[r][c] = null;
  compact();
}

function compact() {
  grid = grid.filter(row => row.some(Boolean));
  if (!grid.length) return;
  padGrid();
  const cols = nCols();
  const deadCols = [];
  for (let c = 0; c < cols; c++) {
    if (grid.every(row => !row[c])) deadCols.push(c);
  }
  if (deadCols.length) {
    const keep = new Set(Array.from({length: cols}, (_, i) => i).filter(i => !deadCols.includes(i)));
    for (let r = 0; r < grid.length; r++) {
      grid[r] = grid[r].filter((_, i) => keep.has(i));
    }
  }
}

function swapCells(r1, c1, r2, c2) {
  [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
}

// ── File ingestion ─────────────────────────────────────────────────────────
async function makeCells(files) {
  const imgFiles = [...files].filter(f => f.type.startsWith('image/'));
  return Promise.all(imgFiles.map(async f => ({
    id: uid(), name: f.name, file: f, dataURL: await readDataURL(f),
  })));
}

// Called when files are dropped onto the empty-state drop zone.
async function initFromFiles(files) {
  const cells = await makeCells(files);
  if (!cells.length) return;
  grid = [cells];
  render();
}

// Called when files are dropped onto a grid cell's zone.
async function dropFilesOnCell(r, c, zone, files) {
  const cells = await makeCells(files);
  if (!cells.length) return;

  const first = cells[0];

  if (zone === 'center') {
    grid[r][c] = first;
    // Additional files: insert new columns to the right
    for (let i = 1; i < cells.length; i++) {
      insertCol(c + i - 1);
      grid[r][c + i] = cells[i];
    }
  } else if (zone === 'right') {
    insertCol(c);
    grid[r][c + 1] = first;
  } else if (zone === 'left') {
    insertCol(c - 1);    // new column lands at index c
    grid[r][c] = first;
  } else if (zone === 'bottom') {
    insertRow(r);
    grid[r + 1][c] = first;
  } else if (zone === 'top') {
    insertRow(r - 1);    // new row lands at index r
    grid[r][c] = first;
  }

  render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  if (!hasImages()) {
    gridOuter.style.display = 'none';
    dropZoneEl.style.display = 'flex';
    stitchBtn.disabled = true;
    statusEl.textContent = 'Drop images to start';
    return;
  }

  dropZoneEl.style.display = 'none';
  gridOuter.style.display = 'flex';

  const rows = nRows(), cols = nCols();
  gridEl.style.gridTemplateColumns = `repeat(${cols}, auto)`;
  gridEl.style.gridTemplateRows    = `repeat(${rows}, auto)`;
  gridEl.innerHTML = '';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = grid[r][c];
      gridEl.appendChild(cell ? buildCell(cell, r, c) : buildEmptyCell(r, c));
    }
  }

  const n = imageCount();
  statusEl.textContent = `${n} image${n !== 1 ? 's' : ''} · ${rows}×${cols} grid`;
  stitchBtn.disabled = n < 2;
}

// ── Cell builders ──────────────────────────────────────────────────────────
function buildCell(cell, r, c) {
  const el = document.createElement('div');
  el.className = 'cell';
  el.draggable = true;

  const img = document.createElement('img');
  img.src = cell.dataURL;
  img.alt = cell.name;
  el.appendChild(img);

  // Drop overlay (zone highlights)
  const overlay = document.createElement('div');
  overlay.className = 'drop-overlay';
  for (const zone of ['center','left','right','top','bottom']) {
    const dz = document.createElement('div');
    dz.className = `dz dz-${zone}`;
    overlay.appendChild(dz);
  }
  el.appendChild(overlay);

  // Remove button
  const rmBtn = document.createElement('button');
  rmBtn.className = 'btn-remove';
  rmBtn.title = 'Remove';
  rmBtn.textContent = '×';
  rmBtn.addEventListener('click', e => { e.stopPropagation(); removeCell(r, c); render(); });
  el.appendChild(rmBtn);

  // ── Drag source events
  el.addEventListener('dragstart', e => {
    dragSrc = { r, c };
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', `${r},${c}`);
    requestAnimationFrame(() => el.classList.add('dragging'));
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragSrc = null;
    clearZones();
  });

  // ── Drop target events
  el.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    activateZone(overlay, getZone(e, el));
  });
  el.addEventListener('dragleave', e => {
    if (!el.contains(e.relatedTarget)) clearZones(overlay);
  });
  el.addEventListener('drop', e => {
    e.preventDefault();
    const zone = getZone(e, el);
    clearZones();
    handleDrop(e, r, c, zone);
  });

  return el;
}

function buildEmptyCell(r, c) {
  const el = document.createElement('div');
  el.className = 'cell empty';
  el.textContent = '+';

  el.addEventListener('dragover', e => {
    e.preventDefault();
    el.classList.add('drag-over-empty');
  });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over-empty'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over-empty');
    handleDrop(e, r, c, 'center');
  });

  return el;
}

// ── Zone helpers ────────────────────────────────────────────────────────────
function getZone(e, el) {
  const rect = el.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top)  / rect.height;
  const EDGE = 0.28;
  if (x < EDGE)     return 'left';
  if (x > 1 - EDGE) return 'right';
  if (y < EDGE)     return 'top';
  if (y > 1 - EDGE) return 'bottom';
  return 'center';
}

function activateZone(overlay, zone) {
  for (const dz of overlay.querySelectorAll('.dz')) {
    dz.classList.toggle('active', dz.classList.contains(`dz-${zone}`));
  }
}

function clearZones(overlay) {
  const root = overlay || document;
  root.querySelectorAll('.dz.active').forEach(el => el.classList.remove('active'));
}

// ── Drop dispatch ───────────────────────────────────────────────────────────
async function handleDrop(e, r, c, zone) {
  // Files from the filesystem take priority
  if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
    await dropFilesOnCell(r, c, zone, e.dataTransfer.files);
    return;
  }

  // Existing cell drag → swap (only when dropped on center)
  if (dragSrc) {
    const { r: sr, c: sc } = dragSrc;
    if (sr === r && sc === c) return;
    if (zone === 'center') {
      swapCells(sr, sc, r, c);
    } else {
      // Treat non-center as swap for existing-cell drags (simpler UX)
      swapCells(sr, sc, r, c);
    }
    render();
  }
}

// ── Upload (empty state) ────────────────────────────────────────────────────
dropZoneEl.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files.length) initFromFiles(e.target.files);
  fileInput.value = '';
});
dropZoneEl.addEventListener('dragover', e => {
  e.preventDefault();
  dropZoneEl.classList.add('drag-over');
});
dropZoneEl.addEventListener('dragleave', () => dropZoneEl.classList.remove('drag-over'));
dropZoneEl.addEventListener('drop', e => {
  e.preventDefault();
  dropZoneEl.classList.remove('drag-over');
  if (e.dataTransfer.files.length) initFromFiles(e.dataTransfer.files);
});

// ── Add col / row ────────────────────────────────────────────────────────────
addColBtn.addEventListener('click', () => { if (hasImages()) { insertCol(nCols() - 1); render(); } });
addRowBtn.addEventListener('click', () => { if (hasImages()) { insertRow(nRows() - 1); render(); } });

// Allow dropping files onto add-col / add-row buttons
addColBtn.addEventListener('dragover', e => { e.preventDefault(); addColBtn.style.background = '#1d4ed8'; });
addColBtn.addEventListener('dragleave', () => { addColBtn.style.background = ''; });
addColBtn.addEventListener('drop', async e => {
  e.preventDefault();
  addColBtn.style.background = '';
  if (!e.dataTransfer.files.length) return;
  const cells = await makeCells(e.dataTransfer.files);
  if (!cells.length) return;
  insertCol(nCols() - 1);
  const c = nCols() - 1;
  grid[0][c] = cells[0];
  render();
});

addRowBtn.addEventListener('dragover', e => { e.preventDefault(); addRowBtn.style.background = '#1d4ed8'; });
addRowBtn.addEventListener('dragleave', () => { addRowBtn.style.background = ''; });
addRowBtn.addEventListener('drop', async e => {
  e.preventDefault();
  addRowBtn.style.background = '';
  if (!e.dataTransfer.files.length) return;
  const cells = await makeCells(e.dataTransfer.files);
  if (!cells.length) return;
  insertRow(nRows() - 1);
  const r = nRows() - 1;
  grid[r][0] = cells[0];
  render();
});

// ── Stitch & download ────────────────────────────────────────────────────────
stitchBtn.addEventListener('click', async () => {
  if (!hasImages()) return;

  processingEl.classList.add('visible');
  stitchBtn.disabled = true;

  try {
    const formData = new FormData();
    const layoutIds = grid.map(row => row.map(cell => cell ? cell.id : null));
    formData.append('layout', JSON.stringify(layoutIds));

    const seen = new Set();
    for (const row of grid) {
      for (const cell of row) {
        if (cell && !seen.has(cell.id)) {
          formData.append(cell.id, cell.file, cell.name);
          seen.add(cell.id);
        }
      }
    }

    const res = await fetch('/stitch', { method: 'POST', body: formData });
    if (!res.ok) {
      const msg = await res.text().catch(() => res.statusText);
      throw new Error(`Server error ${res.status}: ${msg}`);
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'stitched.jpg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    statusEl.textContent = 'Downloaded!';
    setTimeout(() => {
      const n = imageCount();
      statusEl.textContent = `${n} image${n !== 1 ? 's' : ''} · ${nRows()}×${nCols()} grid`;
    }, 2500);
  } catch (err) {
    console.error(err);
    statusEl.textContent = 'Error — see console';
    alert('Stitch failed:\n' + err.message);
  } finally {
    processingEl.classList.remove('visible');
    stitchBtn.disabled = imageCount() < 2;
  }
});
</script>
</body>
</html>
